<!DOCTYPE html>
<html>

<head>
<title>PhishGuard Scanner</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<h1>Phishing URL Scanner</h1>

<form action="/scan" method="POST">

<input type="text" name="url" placeholder="Enter URL to scan" required>

<br><br>

<button type="submit">Scan URL</button>

</form>

{% if result %}

<div class="result">

<h2>Result</h2>

<p>URL: {{ url }}</p>

<p>{{ result }}</p>

</div>

{% endif %}

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
