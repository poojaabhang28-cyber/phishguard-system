<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scan URL</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            margin:0;
            padding:0;
        }

        .container{
            width:500px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        h2{
            margin-bottom:20px;
        }

        input[type=text], input[type=url]{
            width:90%;
            padding:12px;
            margin:10px 0;
            border-radius:5px;
            border:1px solid #ccc;
        }

        button{
            padding:12px 25px;
            background:#007bff;
            border:none;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        a{
            display:block;
            margin-top:20px;
            text-decoration:none;
            color:#333;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Scan URL For Phishing</h2>

    <form method="POST" action="/scan">

        <!-- NEW INPUT for Social Media / Deep Web Monitoring -->
        <input type="text" name="username" placeholder="Username" required>

        <!-- URL input field -->
        <input type="url" name="url"
               placeholder="Enter website URL (example: https://example.com)"
               required>

        <br>

        <button type="submit">
            Scan URL
        </button>

    </form>

    <a href="/history">View Scan History</a>

</div>

</body>
</html>
