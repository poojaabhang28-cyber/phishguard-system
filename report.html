<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report Phishing URL</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:0;
}

.navbar{
    background:#0d6efd;
    padding:15px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-right:20px;
    font-weight:bold;
}

.container{
    width:500px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

input, textarea{
    width:90%;
    padding:12px;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    background:#dc3545;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#b02a37;
}

</style>

</head>

<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/dashboard">Dashboard</a>
<a href="/scan">Scan</a>
<a href="/history">History</a>
<a href="/report">Report</a>
<a href="/about">About</a>
</div>

<div class="container">

<h2>Report Phishing Website</h2>

<p>If you find a phishing or suspicious URL, report it here.</p>

<form method="POST" action="/report">

<input type="text" name="url" placeholder="Enter suspicious URL" required>

<textarea name="message" placeholder="Additional details (optional)"></textarea>

<br>

<button type="submit">Submit Report</button>

</form>

</div>

</body>
</html>
