<!DOCTYPE html>
<html>
<head>
<title>Scan History</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
}

table{
width:80%;
margin:auto;
border-collapse:collapse;
margin-top:40px;
}

th,td{
padding:12px;
border:1px solid #ccc;
}

th{
background:#2563eb;
}

</style>

</head>

<body>

<h1>URL Scan History</h1>

<table>

<tr>
<th>URL</th>
<th>Result</th>
<th>Risk Score</th>
<th>Date</th>
</tr>

{% for row in data %}

<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}%</td>
<td>{{row[3]}}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
